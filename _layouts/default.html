<!doctype html>
<html lang="{{ site.lang | default: 'fr' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f6f0e8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
    {% include head-custom.html %}
  </head>
  <body class="layout-{{ page.layout | default: 'default' }}">
    <div class="site-shell">
      <header class="site-header">
        <div class="site-frame">
          <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
            <span class="site-brand__mark">CO</span>
            <span class="site-brand__text">
              <strong>{{ site.title }}</strong>
              <small>{{ site.description }}</small>
            </span>
          </a>

          <nav class="site-nav" aria-label="Navigation principale">
            <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Accueil</a>
            <a href="{{ '/recipes/' | relative_url }}" {% if page.url == '/recipes/' %}aria-current="page"{% endif %}>Recettes</a>
          </nav>
        </div>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="site-frame site-footer__inner">
          <p>Recettes maison, portions ajustables et pages statiques propres.</p>
          <p><a href="{{ '/recipes/' | relative_url }}">Voir toutes les recettes</a></p>
        </div>
      </footer>
    </div>
  </body>
</html>
